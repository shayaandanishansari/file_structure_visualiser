name: file_structure_visualiser
description: A clean file structure creator & visualiser.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Add versions if you want stricter reproducibility
  archive: any
  path_provider: any
  path: any

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: any
  # Bump to a newer version to match the newer config schema
  flutter_launcher_icons: ^0.14.4

# New config key (NOT flutter_icons)
flutter_launcher_icons:
  image_path: "assets/logo.png"

  android: true
  ios: true

  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/logo.png"

  # Newer schema expects maps for these platforms
  windows:
    generate: true
    image_path: "assets/logo.png"
    icon_size: 256

  macos:
    generate: true
    image_path: "assets/logo.png"

  # Optional: generate PWA icons/manifest entries
  web:
    generate: true
    image_path: "assets/logo.png"
    background_color: "#ffffff"
    theme_color: "#ffffff"

flutter:
  uses-material-design: true

  assets:
    - assets/logo.png
