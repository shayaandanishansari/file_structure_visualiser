name: Build and Release

on:
  push:
    branches:
      - release

permissions:
  contents: write

env:
  APP_ID: file_structure_visualiser

jobs:
  # -------------------------------
  # 1) WEB: build + deploy to Pages
  # -------------------------------
  web_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Pub get
        run: flutter pub get

      - name: Enable Web
        run: flutter config --enable-web

      # Base href automatically matches repo name
      - name: Build Web
        run: flutter build web --release --base-href="/${{ github.event.repository.name }}/"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: build/web


  # -------------------------------
  # 2) LINUX build
  # -------------------------------
  linux_build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Pub get
        run: flutter pub get

      - name: Enable Linux Desktop
        run: flutter config --enable-linux-desktop

      - name: Build Linux
        run: flutter build linux --release

      - name: Package Linux
        run: |
          cd build/linux/x64/release/bundle
          zip -r "$GITHUB_WORKSPACE/${APP_ID}_linux.zip" .

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v3
        with:
          name: linux
          path: ${{ env.APP_ID }}_linux.zip


  # -------------------------------
  # 3) ANDROID build
  # -------------------------------
  android_build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Pub get
        run: flutter pub get

      - name: Build Android APK
        run: flutter build apk --release

      - name: Rename APK
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk "${APP_ID}_android.apk"

      - name: Upload Android Artifact
        uses: actions/upload-artifact@v3
        with:
          name: android
          path: ${{ env.APP_ID }}_android.apk


  # -------------------------------
  # 4) WINDOWS build
  # -------------------------------
  windows_build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Pub get
        run: flutter pub get

      - name: Enable Windows Desktop
        run: flutter config --enable-windows-desktop

      - name: Build Windows
        run: flutter build windows --release

      - name: Package Windows
        shell: pwsh
        run: |
          $src = "build/windows/x64/runner/Release/*"
          $dst = "${env:APP_ID}_windows.zip"
          Compress-Archive -Path $src -DestinationPath $dst -Force

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v3
        with:
          name: windows
          path: ${{ env.APP_ID }}_windows.zip


  # -------------------------------
  # 5) macOS + iOS build
  # -------------------------------
  apple_build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Pub get
        run: flutter pub get

      - name: Enable macOS Desktop
        run: flutter config --enable-macos-desktop

      - name: Build macOS
        run: flutter build macos --release

      - name: Package macOS
        run: |
          APP_PATH="build/macos/Build/Products/Release/*.app"
          # zip with proper mac metadata
          ditto -c -k --sequesterRsrc --keepParent $APP_PATH "${APP_ID}_macos.zip"

      # iOS without signing (good enough for portfolio)
      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Package iOS .app
        run: |
          IOS_APP="build/ios/iphoneos/Runner.app"
          ditto -c -k --sequesterRsrc --keepParent "$IOS_APP" "${APP_ID}_ios_app.zip"

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v3
        with:
          name: macos
          path: ${{ env.APP_ID }}_macos.zip

      - name: Upload iOS Artifact
        uses: actions/upload-artifact@v3
        with:
          name: ios
          path: ${{ env.APP_ID }}_ios_app.zip


  # -------------------------------
  # 6) CREATE GITHUB RELEASE
  #    (excluding the web build)
  # -------------------------------
  publish_release:
    needs:
      - linux_build
      - android_build
      - windows_build
      - apple_build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (full history for tagging)
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Download Linux
        uses: actions/download-artifact@v3
        with:
          name: linux
          path: dist

      - name: Download Android
        uses: actions/download-artifact@v3
        with:
          name: android
          path: dist

      - name: Download Windows
        uses: actions/download-artifact@v3
        with:
          name: windows
          path: dist

      - name: Download macOS
        uses: actions/download-artifact@v3
        with:
          name: macos
          path: dist

      - name: Download iOS
        uses: actions/download-artifact@v3
        with:
          name: ios
          path: dist

      # Auto-tag so YOU don't have to manage tags manually
      - name: Create auto tag
        run: |
          TAG="release-${{ github.run_number }}"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag -a "$TAG" -m "Automated release from release branch"
          git push origin "$TAG"
          echo "TAG=$TAG" >> $GITHUB_ENV

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.TAG }}
          name: "Release ${{ github.run_number }}"
          body: |
            Automated build from the **release** branch.

            Included:
            - Windows
            - macOS
            - Linux
            - Android
            - iOS (unsigned .app)

            Web is deployed to GitHub Pages separately.
          files: |
            dist/${{ env.APP_ID }}_windows.zip
            dist/${{ env.APP_ID }}_macos.zip
            dist/${{ env.APP_ID }}_linux.zip
            dist/${{ env.APP_ID }}_android.apk
            dist/${{ env.APP_ID }}_ios_app.zip













