name: Build and Release

on:
  push:
    branches:
      - release
  workflow_dispatch:

# Default token perms for all jobs
permissions:
  contents: write

env:
  APP_ID: file_structure_visualiser

jobs:
  # -------------------------------
  # 1) WEB: build + deploy to Pages
  # -------------------------------
  web_deploy:
    name: Web Deploy
    runs-on: ubuntu-latest
    concurrency:
      group: web-pages-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Pub get
        run: flutter pub get

      - name: Enable Web
        run: flutter config --enable-web

      - name: Build Web
        run: flutter build web --release --base-href="/${{ github.event.repository.name }}/"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: build/web

  # -------------------------------
  # 2) LINUX build
  # -------------------------------
  linux_build:
    name: Linux Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build \
            libgtk-3-dev \
            libblkid-dev \
            liblzma-dev \
            pkg-config

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Pub get
        run: flutter pub get

      - name: Enable Linux Desktop
        run: flutter config --enable-linux-desktop

      - name: Build Linux
        run: flutter build linux --release

      - name: Package Linux
        run: |
          cd build/linux/x64/release/bundle
          zip -r "$GITHUB_WORKSPACE/${APP_ID}_linux.zip" .

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: ${{ env.APP_ID }}_linux.zip
          if-no-files-found: error

  # -------------------------------
  # 3) ANDROID build
  # -------------------------------
  android_build:
    name: Android Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Pub get
        run: flutter pub get

      - name: Build Android APK
        run: flutter build apk --release

      - name: Rename APK
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk "${APP_ID}_android.apk"

      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android
          path: ${{ env.APP_ID }}_android.apk
          if-no-files-found: error

  # -------------------------------
  # 4) WINDOWS build
  # -------------------------------
  windows_build:
    name: Windows Build
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Pub get
        run: flutter pub get

      - name: Enable Windows Desktop
        run: flutter config --enable-windows-desktop

      - name: Build Windows
        run: flutter build windows --release

      - name: Package Windows
        shell: pwsh
        run: |
          $src = "build/windows/x64/runner/Release/*"
          $dst = "${env:APP_ID}_windows.zip"
          Compress-Archive -Path $src -DestinationPath $dst -Force

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: ${{ env.APP_ID }}_windows.zip
          if-no-files-found: error

  # -------------------------------
  # 5) macOS + iOS build
  # -------------------------------
  apple_build:
    name: Apple (macOS + iOS) Build
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Pub get
        run: flutter pub get

      - name: Enable macOS Desktop
        run: flutter config --enable-macos-desktop

      - name: Build macOS
        run: flutter build macos --release

      - name: Package macOS
        run: |
          APP_PATH="$(ls -d build/macos/Build/Products/Release/*.app | head -n 1)"
          if [ -z "$APP_PATH" ]; then
            echo "No .app found for macOS build."
            exit 1
          fi
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "${APP_ID}_macos.zip"

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Package iOS .app
        run: |
          IOS_APP="build/ios/iphoneos/Runner.app"
          if [ ! -d "$IOS_APP" ]; then
            echo "iOS .app not found."
            exit 1
          fi
          ditto -c -k --sequesterRsrc --keepParent "$IOS_APP" "${APP_ID}_ios_app.zip"

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos
          path: ${{ env.APP_ID }}_macos.zip
          if-no-files-found: error

      - name: Upload iOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios
          path: ${{ env.APP_ID }}_ios_app.zip
          if-no-files-found: error

  # -------------------------------
  # 6) CREATE GITHUB RELEASE
  #    (excluding the web build)
  # -------------------------------
  publish_release:
    name: Publish Release
    needs:
      - linux_build
      - android_build
      - windows_build
      - apple_build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (full history for tagging)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten dist
        run: |
          # download-artifact@v4 creates subfolders per artifact name
          find dist -type f -maxdepth 2 -print -exec mv -t dist {} \;
          find dist -type d -empty -delete

      - name: Create auto tag
        run: |
          TAG="release-${{ github.run_number }}"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag -a "$TAG" -m "Automated release from release branch"
          git push origin "$TAG"
          echo "TAG=$TAG" >> $GITHUB_ENV

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: "Release ${{ github.run_number }}"
          body: |
            Automated build from the **release** branch.

            Included:
            - Windows
            - macOS
            - Linux
            - Android
            - iOS (unsigned .app)

            Web is deployed to GitHub Pages separately.
          files: |
            dist/${{ env.APP_ID }}_windows.zip
            dist/${{ env.APP_ID }}_macos.zip
            dist/${{ env.APP_ID }}_linux.zip
            dist/${{ env.APP_ID }}_android.apk
            dist/${{ env.APP_ID }}_ios_app.zip














